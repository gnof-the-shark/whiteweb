<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>White Family - À propos</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.75);
        --border: rgba(148, 163, 184, 0.3);
        --text: #e2e8f0;
        --accent: #38bdf8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at 10% 10%, #1d4ed8 0%, #0f172a 40%, var(--bg) 100%);
        color: var(--text);
        line-height: 1.5;
      }
      .top-banner {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.5rem;
        backdrop-filter: blur(14px);
        background: rgba(2, 6, 23, 0.75);
        border-bottom: 1px solid var(--border);
      }
      .site-name { margin: 0; font-size: 1.1rem; letter-spacing: 0.04em; }
      nav { display: flex; flex-wrap: wrap; gap: 0.8rem; }
      nav a {
        color: var(--text);
        text-decoration: none;
        padding: 0.4rem 0.75rem;
        border-radius: 999px;
        border: 1px solid transparent;
      }
      nav a:hover,
      nav a[aria-current="page"] {
        border-color: var(--accent);
        color: #f8fafc;
      }
      main {
        width: min(1000px, 92vw);
        margin: 2rem auto 3rem;
        display: grid;
        gap: 1rem;
      }
      section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.2rem;
      }
      h2 { margin-top: 0; margin-bottom: 0.6rem; }
      .placeholder {
        display: inline-block;
        background: rgba(56, 189, 248, 0.16);
        border: 1px dashed rgba(56, 189, 248, 0.7);
        color: #bae6fd;
        border-radius: 10px;
        padding: 0.15rem 0.45rem;
      }
      footer {
        text-align: center;
        color: #94a3b8;
        padding: 0 1rem 1.5rem;
      }
    </style>
  </head>
  <body>
    <header class="top-banner">
      <h1 class="site-name">White Family</h1>
      <nav aria-label="Navigation principale">
        <a href="/index.html">Accueil</a>
        <a href="/nouvelles.html">Nouvelles</a>
        <a href="/contacter.html">Me contacter</a>
        <a href="/apropos.html" aria-current="page">À propos</a>
      </nav>
    </header>

    <main>
      <section>
        <h2><span class="placeholder">[À PROPOS - TITRE]</span></h2>
        <p><span class="placeholder">[PRÉSENTATION GÉNÉRALE À REMPLACER]</span></p>
      </section>

      <section>
        <h2><span class="placeholder">[NOTRE HISTOIRE]</span></h2>
        <p><span class="placeholder">[TEXTE HISTOIRE À REMPLACER]</span></p>
      </section>

      <section>
        <h2><span class="placeholder">[NOS VALEURS]</span></h2>
        <p><span class="placeholder">[TEXTE VALEURS À REMPLACER]</span></p>
      </section>
    </main>

    <footer>© White Family — white.is-a.dev</footer>
  </body>
</html>

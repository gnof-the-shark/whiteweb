<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Famille White - Contacter les autres</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-banner">
      <h1 class="site-name">Famille White</h1>
      <nav aria-label="Navigation principale">
        <a href="index.html">Accueil</a>
        <a href="nouvelles.html">Nouvelles</a>
        <a href="contacter.html" aria-current="page">Contacter les autres</a>
        <a href="me-contacter.html">Me contacter</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Contacter les autres</h2>
        <p>Entre ton prénom pour voir les coordonnées privées.</p>
        <form id="contact-form" class="auth-form">
          <label for="prenom">Prénom</label>
          <input id="prenom" name="prenom" type="text" autocomplete="given-name" required />
          <button type="submit">Accéder aux infos</button>
        </form>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section id="contact-result" class="hidden">
        <h2>Coordonnées</h2>
        <ul id="contact-list"></ul>
      </section>
    </main>

    <footer>© Christophe White — white.is-a.dev</footer>

    <script>
      const form = document.getElementById('contact-form');
      const statusMessage = document.getElementById('status');
      const resultSection = document.getElementById('contact-result');
      const contactList = document.getElementById('contact-list');

      // Liste des prénoms (mots de passe) qui ont le droit de voir les infos
      // Écris-les en minuscules ici
      const prenomsAutorises = ["christophe", "maman", "papa", "grand-maman"];

      // Les informations uniques que tout le monde va voir
      const infosPartagees = [
        "Maman: 514-555-0101",
        "Papa: 514-555-0102",
        "Frère: 514-555-0103",
        "Code du garage: 4321"
      ];

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        resultSection.classList.add('hidden');
        contactList.innerHTML = '';
        statusMessage.textContent = 'Vérification en cours...';

        // Récupère le prénom saisi et le met en minuscules
        const prenom Saisi = new FormData(form).get('prenom').trim().toLowerCase();

        // Vérifie si le prénom fait partie de la liste autorisée
        if (prenomsAutorises.includes(prenomSaisi)) {
          
          infosPartagees.forEach((entry) => {
            const item = document.createElement('li');
            item.textContent = entry;
            contactList.appendChild(item);
          });

          statusMessage.textContent = '';
          resultSection.classList.remove('hidden');
        } else {
          statusMessage.textContent = 'Accès refusé. Prénom non autorisé.';
        }
      });
    </script>
  </body>
</html>

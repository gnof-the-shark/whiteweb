name: Deploy static site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static files
        run: |
          mkdir -p /tmp/pages-site
          cp /tmp/workspace/gnof-the-shark/whiteweb/index.html /tmp/pages-site/index.html
          cp /tmp/workspace/gnof-the-shark/whiteweb/CNAME /tmp/pages-site/CNAME
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>White Family - white.is-a.dev</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
          "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 10% 10%, #3b82f6 0%, #0f172a 48%, #020617 100%);
      }

      main {
        position: relative;
        text-align: center;
        padding: 2rem;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px) saturate(180%) brightness(1.06);
        -webkit-backdrop-filter: blur(16px) saturate(180%) brightness(1.06);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #f8fafc;
        width: min(90vw, 720px);
        box-shadow:
          inset 0 1.5px 0 rgba(255, 255, 255, 0.62),
          inset 0 -1px 0 rgba(0, 0, 0, 0.1),
          0 12px 30px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      main::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          168deg,
          rgba(255, 255, 255, 0.35) 0%,
          rgba(255, 255, 255, 0.08) 30%,
          transparent 58%
        );
        pointer-events: none;
      }

      h1 {
        margin-top: 0;
      }

      a {
        color: #bfdbfe;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bienvenue chez les Whites</h1>
      <p>Le site officiel de la famille White.</p>
      <p>Retrouvez-nous sur <a href="https://white.is-a.dev">white.is-a.dev</a>.</p>
    </main>
  </body>
</html>

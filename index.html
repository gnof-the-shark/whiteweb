<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>White Family - white.is-a.dev</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1d4ed8);
      }

      main {
        text-align: center;
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.88);
        color: #0f172a;
        width: min(90vw, 720px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin-top: 0;
      }

      a {
        color: #1d4ed8;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bienvenue chez les Whites</h1>
      <p>Le site officiel de la famille White.</p>
      <p>
        Retrouvez-nous sur
        <a href="https://white.is-a.dev">white.is-a.dev</a>
      </p>
    </main>
  </body>
</html>
